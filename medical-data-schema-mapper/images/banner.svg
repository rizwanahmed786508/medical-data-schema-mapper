<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Medical Data Schema Mapper - AI-Powered Semantic Schema Matching for Healthcare Data Integration</title>
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap');
    .title { font-family: 'Space Grotesk', 'Manrope', sans-serif; }
    .body  { font-family: 'Manrope', 'Inter', sans-serif; }
  </style>

  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#070a14"/>
    <stop offset="45%" stop-color="#0b0f1f"/>
    <stop offset="100%" stop-color="#0a1420"/>
  </linearGradient>

  <linearGradient id="accentText" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#34e2a8"/>
    <stop offset="55%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#2dd4bf"/>
  </linearGradient>

  <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#10b981"/>
    <stop offset="50%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#14b8a6"/>
  </linearGradient>

  <radialGradient id="glowEmerald" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="brainFill" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.9"/>
  </linearGradient>

  <linearGradient id="dbFill" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#0f766e" stop-opacity="0.35"/>
  </linearGradient>

  <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="18"/>
  </filter>
  <filter id="particleBlur" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="2.2"/>
  </filter>

  <clipPath id="canvasClip">
    <rect x="0" y="0" width="1280" height="320" rx="18"/>
  </clipPath>
</defs>

<g clip-path="url(#canvasClip)">
  <rect x="0" y="0" width="1280" height="320" fill="url(#bg)"/>

  <!-- ambient glows -->
  <circle cx="150" cy="40" r="180" fill="url(#glowEmerald)"/>
  <circle cx="640" cy="300" r="220" fill="url(#glowPurple)"/>
  <circle cx="1150" cy="60" r="220" fill="url(#glowTeal)"/>
  <circle cx="980" cy="250" r="150" fill="url(#glowEmerald)" opacity="0.5"/>

  <!-- subtle grid texture -->
  <g opacity="0.05" stroke="#8fb8ff">
    <line x1="0" y1="80" x2="1280" y2="80" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke-width="1"/>
  </g>

  <!-- outer border -->
  <rect x="1" y="1" width="1278" height="318" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- ================= LEFT SIDE ================= -->
  <g class="title">
    <text x="56" y="108" font-size="40" font-weight="700" fill="#f4f7fb">🧠 Medical Data</text>
    <text x="56" y="156" font-size="40" font-weight="700" fill="url(#accentText)">Schema Mapper</text>
  </g>

  <text x="58" y="188" class="body" font-size="16.5" font-weight="500" fill="#a9b4c9">
    AI-Powered Semantic Schema Matching for Healthcare Data Integration
  </text>

  <!-- tech pills row 1 -->
  <g class="body" font-size="12.5" font-weight="600">
    <g>
      <rect x="56" y="212" width="150" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#10b981" stroke-opacity="0.45"/>
      <text x="131" y="231" text-anchor="middle" fill="#5eead4">Sentence Transformers</text>
    </g>
    <g>
      <rect x="216" y="212" width="98" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#8b5cf6" stroke-opacity="0.45"/>
      <text x="265" y="231" text-anchor="middle" fill="#c4b5fd">RapidFuzz</text>
    </g>
    <g>
      <rect x="324" y="212" width="132" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#2dd4bf" stroke-opacity="0.45"/>
      <text x="390" y="231" text-anchor="middle" fill="#5eead4">Cosine Similarity</text>
    </g>
    <g>
      <rect x="466" y="212" width="132" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#10b981" stroke-opacity="0.45"/>
      <text x="532" y="231" text-anchor="middle" fill="#86efac">Semantic Matching</text>
    </g>
  </g>

  <!-- tech pills row 2 -->
  <g class="body" font-size="12.5" font-weight="600">
    <g>
      <rect x="56" y="252" width="150" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#8b5cf6" stroke-opacity="0.45"/>
      <text x="131" y="271" text-anchor="middle" fill="#c4b5fd">Data Transformation</text>
    </g>
    <g>
      <rect x="216" y="252" width="106" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#2dd4bf" stroke-opacity="0.45"/>
      <text x="269" y="271" text-anchor="middle" fill="#5eead4">Streamlit</text>
    </g>
  </g>

  <!-- ================= RIGHT SIDE ILLUSTRATION ================= -->
  <g filter="url(#softGlow)">
    <!-- connecting pipelines -->
    <path d="M 730 210 Q 810 150 880 165" stroke="url(#lineGrad)" stroke-width="1.6" fill="none" opacity="0.7"/>
    <path d="M 730 150 Q 800 120 875 140" stroke="url(#lineGrad)" stroke-width="1.6" fill="none" opacity="0.6"/>
    <path d="M 940 150 Q 1010 110 1080 130" stroke="url(#lineGrad)" stroke-width="1.6" fill="none" opacity="0.7"/>
    <path d="M 940 190 Q 1010 220 1085 205" stroke="url(#lineGrad)" stroke-width="1.6" fill="none" opacity="0.6"/>
    <path d="M 730 230 Q 800 260 870 235" stroke="url(#lineGrad)" stroke-width="1.6" fill="none" opacity="0.5"/>
  </g>

  <!-- CSV file cards -->
  <g class="body">
    <g transform="translate(686,120)">
      <rect x="0" y="0" width="46" height="56" rx="6" fill="#ffffff" fill-opacity="0.07" stroke="#5eead4" stroke-opacity="0.5"/>
      <path d="M 32 0 L 46 14 L 32 14 Z" fill="#5eead4" fill-opacity="0.35"/>
      <text x="23" y="35" text-anchor="middle" font-size="9" font-weight="700" fill="#5eead4">CSV</text>
      <line x1="8" y1="42" x2="38" y2="42" stroke="#5eead4" stroke-opacity="0.4" stroke-width="1"/>
      <line x1="8" y1="47" x2="30" y2="47" stroke="#5eead4" stroke-opacity="0.4" stroke-width="1"/>
    </g>
    <g transform="translate(686,182)">
      <rect x="0" y="0" width="46" height="56" rx="6" fill="#ffffff" fill-opacity="0.07" stroke="#c4b5fd" stroke-opacity="0.5"/>
      <path d="M 32 0 L 46 14 L 32 14 Z" fill="#c4b5fd" fill-opacity="0.35"/>
      <text x="23" y="35" text-anchor="middle" font-size="9" font-weight="700" fill="#c4b5fd">CSV</text>
      <line x1="8" y1="42" x2="38" y2="42" stroke="#c4b5fd" stroke-opacity="0.4" stroke-width="1"/>
      <line x1="8" y1="47" x2="30" y2="47" stroke="#c4b5fd" stroke-opacity="0.4" stroke-width="1"/>
    </g>
  </g>

  <!-- AI brain (center) -->
  <g transform="translate(870,105)" filter="url(#softGlow)">
    <path d="M35 4
      C 18 4 6 16 6 32
      C 6 38 8 43 11 47
      C 8 51 7 56 9 61
      C 11 68 18 72 25 71
      C 28 76 34 79 40 79
      C 46 79 51 76 54 71
      C 61 72 68 68 70 61
      C 72 56 71 51 68 47
      C 71 43 73 38 73 32
      C 73 16 61 4 44 4
      C 41 4 38 5 35 6
      Z"
      fill="url(#brainFill)" fill-opacity="0.85" stroke="#c7f9e5" stroke-opacity="0.6" stroke-width="1.2"/>
    <path d="M40 10 C 32 14 30 24 36 30 C 30 34 30 44 38 48 C 32 52 34 62 42 65" stroke="#0b1220" stroke-opacity="0.55" stroke-width="1.3" fill="none"/>
    <path d="M40 10 C 48 14 50 24 44 30 C 50 34 50 44 42 48 C 48 52 46 62 38 65" stroke="#0b1220" stroke-opacity="0.4" stroke-width="1.3" fill="none"/>
    <circle cx="39.5" cy="41" r="3.4" fill="#0b1220" fill-opacity="0.55"/>
  </g>

  <!-- neural network nodes around brain -->
  <g filter="url(#softGlow)">
    <line x1="880" y1="150" x2="940" y2="130" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="940" y1="130" x2="940" y2="190" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="880" y1="200" x2="940" y2="190" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="940" y1="130" x2="1000" y2="150" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="940" y1="190" x2="1000" y2="170" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="1000" y1="150" x2="1000" y2="170" stroke="url(#lineGrad)" stroke-width="1.2" opacity="0.5"/>

    <circle cx="940" cy="130" r="5" fill="#34e2a8"/>
    <circle cx="940" cy="190" r="5" fill="#a78bfa"/>
    <circle cx="1000" cy="150" r="5" fill="#2dd4bf"/>
    <circle cx="1000" cy="170" r="5" fill="#34e2a8"/>
    <circle cx="880" cy="150" r="4" fill="#a78bfa"/>
    <circle cx="880" cy="200" r="4" fill="#2dd4bf"/>
  </g>

  <!-- medical database cylinder -->
  <g transform="translate(1035,185)">
    <ellipse cx="30" cy="10" rx="30" ry="10" fill="url(#dbFill)" stroke="#5eead4" stroke-opacity="0.55" stroke-width="1.2"/>
    <path d="M0 10 L0 46 A30 10 0 0 0 60 46 L60 10" fill="url(#dbFill)" stroke="#5eead4" stroke-opacity="0.55" stroke-width="1.2"/>
    <ellipse cx="30" cy="46" rx="30" ry="10" fill="none" stroke="#5eead4" stroke-opacity="0.4" stroke-width="1"/>
    <ellipse cx="30" cy="28" rx="30" ry="10" fill="none" stroke="#5eead4" stroke-opacity="0.3" stroke-width="1"/>
  </g>

  <!-- healthcare cross glass card -->
  <g transform="translate(1150,95)">
    <rect x="-4" y="-4" width="52" height="52" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#f472b6" stroke-opacity="0.4"/>
    <path d="M18 4 H26 V16 H38 V24 H26 V36 H18 V24 H6 V16 H18 Z" fill="#fda4af" fill-opacity="0.85"/>
  </g>

  <!-- pipeline connecting db + cross into network -->
  <g filter="url(#softGlow)">
    <path d="M 1035 205 Q 1010 190 1000 170" stroke="url(#lineGrad)" stroke-width="1.4" fill="none" opacity="0.6"/>
    <path d="M 1150 120 Q 1080 130 1000 150" stroke="url(#lineGrad)" stroke-width="1.4" fill="none" opacity="0.5"/>
  </g>

  <!-- floating glowing particles -->
  <g filter="url(#particleBlur)">
    <circle cx="760" cy="70" r="2.4" fill="#34e2a8" opacity="0.9"/>
    <circle cx="820" cy="240" r="2" fill="#a78bfa" opacity="0.85"/>
    <circle cx="905" cy="55" r="2.2" fill="#2dd4bf" opacity="0.8"/>
    <circle cx="1020" cy="90" r="2" fill="#34e2a8" opacity="0.8"/>
    <circle cx="1100" cy="240" r="2.4" fill="#a78bfa" opacity="0.85"/>
    <circle cx="1180" cy="180" r="2" fill="#2dd4bf" opacity="0.75"/>
    <circle cx="1220" cy="90" r="2.3" fill="#34e2a8" opacity="0.8"/>
    <circle cx="660" cy="150" r="1.8" fill="#2dd4bf" opacity="0.7"/>
    <circle cx="1230" cy="260" r="2" fill="#a78bfa" opacity="0.75"/>
    <circle cx="960" cy="255" r="1.8" fill="#34e2a8" opacity="0.7"/>
  </g>

  <!-- thin divider between text and illustration -->
  <line x1="656" y1="40" x2="656" y2="280" stroke="url(#lineGrad)" stroke-opacity="0.25" stroke-width="1"/>
</g>
</svg>
